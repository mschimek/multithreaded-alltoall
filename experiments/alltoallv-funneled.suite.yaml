name: alltoallv-funneled
# "Funneled" layout: t threads per MPI process, p/t ranks (t cores per rank via
# I_MPI_PIN_DOMAIN). The exchange is still the single-threaded MPI_Alltoallv, but
# each rank owns t cores and t*n elements; OMP_NUM_THREADS=t drives data generation
# and the per-rank data volume. Total data = n*ncores, matching the other suites.
executable: benchmark_singlethreaded
output_path_option_name: "output-file"
ncores: [16,32,48,96,192,384,768,1536, 3076]
threads_per_rank: [2, 4]
omit_seed: true
time_limit: 4
graphs:
  - generator: dummy
    name: a2a
    num-elements-per-worker: 10000
    iterations: 5
    distribution: [uniform, nonuniform]
  - generator: dummy
    name: a2a
    num-elements-per-worker: 100000
    iterations: 5
    distribution: [uniform, nonuniform]
  - generator: dummy
    name: a2a
    num-elements-per-worker: 1000000
    iterations: 5
    distribution: [uniform, nonuniform]
config:
  - {}
