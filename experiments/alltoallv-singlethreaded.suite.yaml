name: alltoallv-singlethreaded
# Single-threaded baseline: 1 thread per MPI process, p ranks total.
# The exchange is a plain MPI_Alltoallv (MPI_THREAD_SINGLE).
executable: benchmark_singlethreaded
output_path_option_name: "output-file"
ncores: [1, 2, 4, 8]
threads_per_rank: [1]
omit_seed: true
time_limit: 4
graphs:
  - generator: dummy
    name: a2a
    num-elements-per-worker: 1000000
    iterations: 10
    distribution: [uniform, nonuniform]
config:
  - {}
